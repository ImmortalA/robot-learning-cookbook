site_name: Robot Learning Cookbook
site_description: "Hands-on Isaac Lab tutorials for training humanoid robots."
site_author: "g1_stand project"
site_url: https://immortala.github.io/robot-learning-cookbook/

# Repo-only; do not add to nav or under docs/ so it appears on the site.
exclude_docs: |
  TUTORIAL_FORMAT_PROMPT.md

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  repo_url: https://github.com/ImmortalA/robot-learning-cookbook
  edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Tutorials:
      - G1 standing with PPO:
          - Overview: tutorials/g1-standing-ppo/index.md
          - Environment config: tutorials/g1-standing-ppo/env_config.md
          - Gym registration: tutorials/g1-standing-ppo/gym_registration.md
          - Configure PPO: tutorials/g1-standing-ppo/ppo_config.md
          - Training: tutorials/g1-standing-ppo/training.md
          - Visualization: tutorials/g1-standing-ppo/visualization.md
          - Troubleshooting: tutorials/g1-standing-ppo/troubleshooting.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

extra:
  generator: false
  hero:
    title: Robot Learning Cookbook
    subtitle: Hands-on tutorials for training humanoid robots with Isaac Lab
    actions:
      - text: Start the tutorial
        link: tutorials/g1-standing-ppo/index.md
        primary: true
      - text: View on GitHub
        link: https://github.com/ImmortalA/robot-learning-cookbook
  social:
    - icon: fontawesome/solid/globe
      link: https://tranducanh.net/
      name: Personal website
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/tran-ducanh/
      name: LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/ImmortalA
      name: GitHub

