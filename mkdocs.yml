site_name: MechaOctopus
site_description: "Hands-on Isaac Lab tutorials for training humanoid robots with NVIDIA Isaac Lab. Learn PPO, reinforcement learning, and G1 humanoid standing from scratch."
site_author: MechaOctopus
site_url: https://mechaoctopus.com/

# Repo-only; do not add to nav or under docs/ so it appears on the site.
exclude_docs: |
  TUTORIAL_FORMAT_PROMPT.md

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  repo_url: https://github.com/ImmortalA/robot-learning-cookbook
  edit_uri: edit/main/docs/

plugins:
  - search
  - meta

nav:
  - Home: index.md
  - Tutorials:
      - G1 standing with PPO:
          - Overview: tutorials/g1-standing-ppo/index.md
          - Environment config: tutorials/g1-standing-ppo/env_config.md
          - Gym registration: tutorials/g1-standing-ppo/gym_registration.md
          - Configure PPO: tutorials/g1-standing-ppo/ppo_config.md
          - Training: tutorials/g1-standing-ppo/training.md
          - Visualization: tutorials/g1-standing-ppo/visualization.md
          - Troubleshooting: tutorials/g1-standing-ppo/troubleshooting.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

extra:
  generator: false
  # Single source for SEO keywords – output as <meta name="keywords"> on every page
  seo_keywords: "robotics tutorial, humanoid robot course, humanoid robot training, robot learning, Isaac Lab tutorial, reinforcement learning tutorial, train humanoid robot, PPO reinforcement learning, Isaac Sim robotics, robot simulation, NVIDIA Isaac Lab, Unitree G1 tutorial, G1 humanoid, reinforcement learning robotics, RL robot control, robot policy training, sim-to-real robotics, Gym environment robotics, RSL-RL, robot balancing, humanoid standing control, machine learning robotics, robot locomotion tutorial, Isaac Sim tutorial, Omniverse robotics, GPU robot training"
  hero:
    title: MechaOctopus
    subtitle: Hands-on Isaac Lab tutorials for training humanoid robots
    actions:
      - text: Start the tutorial
        link: tutorials/g1-standing-ppo/index.md
        primary: true
      - text: View on GitHub
        link: https://github.com/ImmortalA/robot-learning-cookbook
  social:
    - icon: fontawesome/solid/globe
      link: https://tranducanh.net/
      name: Personal website
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/tran-ducanh/
      name: LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/ImmortalA
      name: GitHub

